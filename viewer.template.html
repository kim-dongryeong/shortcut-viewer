<!doctype html>
<html lang="ko">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Ultimate Shortcut Viewer</title>
<style>
  :root{ --bg:#0f1115; --panel:#171a21; --line:#262b36; --txt:#e6e9ef; --dim:#8b93a3; --U:62px; }
  *{box-sizing:border-box}
  body{margin:0;background:var(--bg);color:var(--txt);font:14px/1.4 -apple-system,BlinkMacSystemFont,"SF Pro",Segoe UI,sans-serif}
  header{padding:14px 20px;border-bottom:1px solid var(--line);display:flex;gap:18px;align-items:baseline;flex-wrap:wrap}
  h1{font-size:16px;margin:0;font-weight:600}
  .meta{color:var(--dim);font-size:12px}
  .wrap{padding:18px 20px;max-width:1480px}
  .controls{display:flex;gap:9px;align-items:center;flex-wrap:wrap;margin-bottom:12px}
  .chip{padding:8px 13px;border:1px solid var(--line);border-radius:9px;background:var(--panel);cursor:pointer;user-select:none;font-size:15px}
  .chip.on{background:#2563eb;border-color:#2563eb;color:#fff}
  .chip.alt.on{background:#7c3aed;border-color:#7c3aed}
  .chip.held{box-shadow:0 0 0 2px #22d3ee inset}
  #ctxchips .chip{padding:5px 9px;font-size:12px}
  #ctxchips .chip.on{background:#0d9488;border-color:#0d9488}
  select,input,button{background:var(--panel);color:var(--txt);border:1px solid var(--line);border-radius:9px;padding:8px 11px;font-size:14px}
  button{cursor:pointer}
  button.on{background:#2563eb;border-color:#2563eb}
  input{min-width:200px}
  .combo{font-size:14px;color:var(--dim)}
  .combo b{color:var(--txt)}
  .hint{color:var(--dim);font-size:12px;margin:-2px 0 12px}
  .legend{display:flex;gap:14px;flex-wrap:wrap;margin:6px 0 14px;font-size:12px;color:var(--dim)}
  .dot{display:inline-block;width:10px;height:10px;border-radius:3px;margin-right:5px;vertical-align:-1px}
  .kb{display:flex;align-items:flex-start;gap:28px;flex-wrap:wrap}
  .kbmain{display:flex;flex-direction:column}
  .kbright{display:flex;flex-direction:column}
  .krow{display:flex;align-items:flex-start}
  .cap{position:relative;height:54px;margin:3px;border:1px solid var(--line);border-radius:8px;background:var(--panel);
       padding:4px 6px;overflow:hidden;display:flex;flex-direction:column;cursor:pointer;transition:transform .04s;flex:none}
  .cap:hover{transform:translateY(-1px);border-color:#3a4252}
  .cap .lab{font-size:10.5px;color:var(--dim);font-weight:700;white-space:nowrap}
  .cap .cnt{position:absolute;top:3px;right:5px;font-size:9px;color:var(--dim)}
  .cap .foot{display:flex;gap:3px;margin-top:2px;min-height:6px}
  .cap .fdot{width:6px;height:6px;border-radius:2px}
  .cap .act{font-size:9px;line-height:1.1;margin-top:auto;max-height:22px;overflow:hidden;color:#cdd3df}
  .cap.taken{border-color:#3a4252}
  .ov{font-size:8px;color:var(--dim);padding:0 3px;border-radius:4px;background:#222732;margin-left:2px}
  .ov.dup{color:#f59e0b;background:#3a2a12}
  .cap.busy:not(.taken){border-color:#33405e}
  .cap.dim{opacity:.3}
  .cap .bar{position:absolute;left:0;bottom:0;height:3px;width:100%}
  .cap.mod{align-items:center;justify-content:center;color:var(--dim);background:#12151b}
  .cap.mod.on{background:#2563eb;border-color:#2563eb;color:#fff}
  .cap.mod.held{box-shadow:0 0 0 2px #22d3ee inset}
  .cap.gap{border:none;background:none;cursor:default}
  .cap.sel{border-color:#7dd3fc!important;box-shadow:0 0 0 2px #38bdf8, 0 0 16px rgba(56,189,248,.55);z-index:3;transform:translateY(-1px)}
  .cap.sel .lab{color:#7dd3fc}
  .cap.sel .act{color:#e6f6ff}
  .arrows{display:flex;align-items:flex-end;margin-left:4px}
  .updown{display:flex;flex-direction:column}
  .sec{color:var(--dim);font-size:11px;text-transform:uppercase;letter-spacing:.06em;margin:16px 0 6px}
  .panel{margin-top:18px;border-top:1px solid var(--line);padding-top:14px}
  .row{display:flex;gap:10px;align-items:flex-start;padding:7px 0;border-bottom:1px solid var(--line)}
  .row.hi{background:#0b2a45;box-shadow:inset 3px 0 0 #38bdf8;border-radius:4px}
  .row .src,.drow .src{font-size:11px;padding:2px 7px;border-radius:6px;color:#0b0d11;font-weight:700;white-space:nowrap}
  .dent+.dent{margin-top:4px}
  .row .kc{font-weight:700;white-space:nowrap;min-width:66px}
  .row.hi .kc{color:#7dd3fc}
  .row .scope,.drow .scope{color:var(--dim);font-size:12px;white-space:nowrap}
  .muted{color:var(--dim)}
  #results .row,#overview .row{cursor:pointer}
  #results .row:hover,#overview .row:hover{background:#1b1f28}
  .empty{color:var(--dim);padding:14px 0}
  .tip{position:fixed;z-index:60;background:#0b0d11;border:1px solid var(--line);border-radius:9px;padding:9px 11px;
       max-width:360px;font-size:12px;pointer-events:none;box-shadow:0 10px 30px rgba(0,0,0,.55);display:none}
  .tip .tl{display:flex;gap:8px;padding:2px 0}
  .tip .tl b{min-width:58px;color:#cfe}
  .grp{margin:10px 0 4px;font-weight:700}
  .ovwrap{column-width:310px;column-gap:20px;margin-top:6px}
  .ovgrp{break-inside:avoid;-webkit-column-break-inside:avoid;margin:0 0 14px}
  .ovgrp .gh{font-weight:700;color:#7dd3fc;border-bottom:1px solid var(--line);padding-bottom:3px;margin-bottom:3px;font-size:13px}
  .cs{display:flex;gap:8px;align-items:baseline;padding:2px 4px;border-radius:5px;cursor:pointer}
  .cs:hover{background:#1b1f28}
  .cs.hi{background:#0b2a45;box-shadow:inset 3px 0 0 #38bdf8}
  .cs.hi .csk{color:#7dd3fc}
  .cs .csk{font-weight:700;min-width:72px;white-space:nowrap}
  .cs .csa{flex:1;min-width:0;color:#cdd3df;font-size:12.5px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
  .cs .csd{width:7px;height:7px;border-radius:50%;flex:none;align-self:center}
  .ovtab{display:inline-flex;gap:4px;margin-left:10px;text-transform:none;letter-spacing:0}
  .ovtab button{font-size:11px;padding:2px 9px;border:1px solid var(--line);border-radius:6px;background:var(--panel);color:var(--dim);cursor:pointer}
  .ovtab button.on{background:#0b2a45;border-color:#38bdf8;color:#7dd3fc}
  .annm{position:absolute;top:3px;right:17px;font-size:9px;line-height:1}
  .chord{color:#7dd3fc;font-weight:700;white-space:nowrap}
  .chordm{font-size:8px;color:#7dd3fc;font-weight:700;margin-left:auto}
  .chordbtn{font-size:11px;padding:2px 7px;border:1px solid #38bdf8;border-radius:6px;background:#0b2a45;color:#7dd3fc;cursor:pointer;font-weight:700;white-space:nowrap}
  #gestures{margin:6px 0 2px}
  .gwrap{display:flex;flex-wrap:wrap;gap:8px;margin-top:4px}
  .gcard{display:flex;align-items:center;gap:9px;border:1px solid var(--line);border-radius:10px;padding:7px 12px;background:var(--panel)}
  .gsym{font-weight:800;font-size:16px;color:#7dd3fc;white-space:nowrap}
  .gsym .gtag{font-size:10px;color:var(--dim);font-weight:700;border:1px solid var(--line);border-radius:4px;padding:0 3px;vertical-align:middle}
  .gact{font-size:13px;color:#cdd3df}
  .gsrc{font-size:11px;color:var(--dim);display:inline-flex;align-items:center;gap:4px}
  .gsrc .fdot{display:inline-block;width:6px;height:6px;border-radius:2px}
  #chordbar{background:#0b2a45;border:1px solid #38bdf8;border-radius:9px;padding:10px 14px;margin:8px 0;color:#cfe;font-size:14px}
  #chordbar .x{text-decoration:underline;cursor:pointer;color:#7dd3fc;font-weight:700}
  .drow{display:flex;gap:8px;align-items:flex-start;padding:6px 0;border-bottom:1px solid var(--line)}
  .drow.hi{background:#0b2a45;box-shadow:inset 3px 0 0 #38bdf8;border-radius:4px}
  .drow .kc{font-weight:700;white-space:nowrap;min-width:62px}
  .drow .dbody{flex:1}
  .favbtn{background:none;border:none;color:#f59f00;cursor:pointer;font-size:14px;padding:0 2px;line-height:1.3}
  .favbtn.on{filter:drop-shadow(0 0 3px #ffd43b)}
  .notebtn{background:var(--panel);border:1px solid var(--line);border-radius:6px;color:var(--dim);cursor:pointer;font-size:11px;padding:2px 7px;white-space:nowrap}
  .noteshow{color:#ffd8a8;font-size:11px;margin-top:2px}
  .impbtn{display:inline-flex;align-items:center;padding:8px 11px;border:1px solid var(--line);border-radius:9px;background:var(--panel);cursor:pointer;font-size:14px}
</style>
</head>
<body>
<header>
  <h1>⌨️ Ultimate Shortcut Viewer</h1>
  <span class="meta" id="metaline"></span>
</header>

<div class="wrap">
  <div class="controls">
    <span id="modchips"></span>
    <span class="chip alt" data-special="hyper">Hyper</span>
    <span class="chip alt" data-special="meh">Meh</span>
    <span class="meta" style="align-self:center">컨텍스트:</span><span id="ctxchips" style="display:inline-flex;flex-wrap:wrap;gap:5px"></span>
    <select id="filtersel">
      <option value="all">전체 표시</option>
      <option value="taken">현재 레이어 점유만</option>
      <option value="free">현재 레이어 빈 키만</option>
    </select>
    <input id="search" placeholder="검색: 동작/키/조합">
    <button id="ovbtn" title="선택한 컨텍스트의 모든 단축키를 한 번에 (KeyCue 식 치트시트)">📋 전체 단축키</button>
    <button id="favview">⭐ 즐겨찾기</button>
    <button id="scopepos" title="상세 패널에서 스코프(global/chrome 등) 위치를 오른쪽 ⇄ 왼쪽으로 토글">스코프 ⇄</button>
    <button id="annexport" title="즐겨찾기·노트 파일로 내보내기">⬇︎</button>
    <label class="impbtn" title="즐겨찾기·노트 가져오기">⬆︎<input id="annimport" type="file" accept="application/json" style="display:none"></label>
  </div>
  <div class="hint">키를 <b>물리적으로 hold</b> 하면 레이어 ON(놓으면 복귀) · 수식키 키캡/칩 클릭=고정 · 각 키 숫자=전 조합 수, 점=소스 ·
    키 클릭→하단에 그 키의 <b>전 조합</b>, 수식키 누르면 해당 조합 <b style="color:#7dd3fc">하이라이트</b> · hover=미리보기 ·
    <span id="comboline"></span></div>

  <div class="legend" id="legend"></div>
  <div id="chordbar" style="display:none"></div>
  <div class="kb" id="kb"></div>
  <div id="extras"></div>
  <div id="gestures"></div>

  <div class="panel">
    <div id="detail"><div class="empty">키를 클릭하면 그 키에 걸린 <b>모든 수식키 조합</b>이 여기에 표시되고, 수식키를 누르면 해당 조합이 강조됩니다.</div></div>
    <div id="overview"></div>
    <div id="results"></div>
  </div>
</div>
<div class="tip" id="tip"></div>

<script>
const DB = /*__DATA__*/;
// ── favorites + notes, persisted in localStorage (survives rebuilds at the same file path) ──
let ANN = {fav:{}, note:{}};
try { const base=DB.ann||{}; Object.assign(ANN.fav, base.fav||{}); Object.assign(ANN.note, base.note||{}); } catch(e){}  // baked-in (annotations.json)
try { const s=JSON.parse(localStorage.getItem('SVann')||'null'); if(s){ Object.assign(ANN.fav,s.fav||{}); Object.assign(ANN.note,s.note||{}); } } catch(e){}  // live localStorage overlay
function saveAnn(){ try { localStorage.setItem('SVann', JSON.stringify(ANN)); } catch(e){} }
function annKey(mods, key){ return [...mods].sort().join('+') + '|' + key; }
let prefScopeRight = localStorage.getItem('SVscopeRight')!=='0';  // 상세 패널 스코프(global/chrome 등) 위치: 오른쪽 정렬(기본) vs 왼쪽 인라인
let ovGroup = ['mod','key','source'].includes(localStorage.getItem('SVovGroup')) ? localStorage.getItem('SVovGroup') : 'mod';  // 전체 단축키 치트시트 묶음 기준 (잘못된 저장값은 'mod'로)
const COLORS = {system:'#3b82f6','app menu':'#9ca3af','app config':'#14b8a6',Karabiner:'#22c55e',BTT:'#f59e0b',Raycast:'#a855f7'};
const MODS = ['ctrl','opt','shift','cmd'];
const MODSYM = {ctrl:'⌃',opt:'⌥',shift:'⇧',cmd:'⌘',fn:'🌐',caps:'⇪'};
const U = 56;
// physical-ish ANSI Mac layout. t:'key' = shortcut key, t:'mod' = modifier toggle, t:'gap' = spacer.
const LAYOUT = [
  [['key','Escape',1,'esc'],['gap',0,0.4],['key','F1',1],['key','F2',1],['key','F3',1],['key','F4',1],['gap',0,0.3],
   ['key','F5',1],['key','F6',1],['key','F7',1],['key','F8',1],['gap',0,0.3],['key','F9',1],['key','F10',1],['key','F11',1],['key','F12',1]],
  [['key','`',1],['key','1',1],['key','2',1],['key','3',1],['key','4',1],['key','5',1],['key','6',1],['key','7',1],['key','8',1],
   ['key','9',1],['key','0',1],['key','-',1],['key','=',1],['key','Delete',2,'⌫ delete']],
  [['key','Tab',1.5,'⇥ tab'],['key','Q',1],['key','W',1],['key','E',1],['key','R',1],['key','T',1],['key','Y',1],['key','U',1],
   ['key','I',1],['key','O',1],['key','P',1],['key','[',1],['key',']',1],['key','\\',1.5]],
  [['key','CapsLock',1.75,'⇪ caps'],['key','A',1],['key','S',1],['key','D',1],['key','F',1],['key','G',1],['key','H',1],['key','J',1],
   ['key','K',1],['key','L',1],['key',';',1],['key',"'",1],['key','Return',2.25,'⏎ return']],
  [['mod','shift',2.25,'⇧ shift'],['key','Z',1],['key','X',1],['key','C',1],['key','V',1],['key','B',1],['key','N',1],['key','M',1],
   ['key',',',1],['key','.',1],['key','/',1],['mod','shift',2.75,'⇧ shift']],
  [['mod','fn',1,'fn'],['mod','ctrl',1.1,'⌃ ctrl'],['mod','opt',1.1,'⌥ opt'],['mod','cmd',1.25,'⌘ cmd'],['key','Space',6.5,''],
   ['mod','cmd',1.25,'⌘ cmd'],['mod','opt',1.1,'⌥ opt']],
];
const NAV = ['Home','End','PageUp','PageDown','ForwardDelete'];
const FEXT = ['F13','F14','F15','F16','F17','F18','F19','F20'];

let sticky=new Set(), held=new Set(), heldStr='', ctxSet=new Set(['Global']), filter='all', eff=new Set(), overview=false, selectedKey=null;
let chordPrefix=null, chordReturn=null, CUR=null;   // which-key(연속) 모드: chordPrefix={mods,key}면 그리드가 그 prefix의 후속(2nd) 키 집합으로 바뀐다

function recompute(){
  eff=new Set([...sticky,...held]);
  CUR = chordPrefix
    ? DB.entries.filter(e=> e.ckey && e.key===chordPrefix.key && sameSet(e.mods,new Set(chordPrefix.mods)) && inCtx(e))
                .map(e=>({mods:e.cmods||[], key:e.ckey, action:e.action, source:e.source, scope:e.scope, detail:e.detail}))  // 후속 누름을 일반 엔트리처럼 리매핑 → 그리드/상세 로직 재사용
    : dedupeDisplay(DB.entries.filter(inCtx));
}
function sameSet(arr,set){ if(arr.length!==set.size) return false; for(const m of arr) if(!set.has(m)) return false; return true; }
function inCtx(e){ return (e.scope==='global' && ctxSet.has('Global')) || ctxSet.has(e.scope) || ctxSet.has(e.group) || (ctxSet.has('BTT (전체)') && e.source==='BTT'); }
function keyAll(key){ return (CUR||(CUR=dedupeDisplay(DB.entries.filter(inCtx)))).filter(e=>e.key===key); }
function matchEff(key){ return keyAll(key).filter(e=>sameSet(e.mods,eff)); }
function comboSym(mods){ return [...MODS,'fn'].filter(m=>mods.includes(m)).map(m=>MODSYM[m]).join(''); }
function chordSym(e){ return e&&e.ckey ? (comboSym(e.cmods||[])+e.ckey) : ''; }                 // 2nd press, 예: ⌘I
function chordTag(e){ return e&&e.ckey ? `<span class="chord">▸ ${chordSym(e)}</span>` : ''; }   // 리더 메뉴 배지
// 표시용 중복 제거: 같은 스코프·조합에서 'app menu' 항목이 다른 소스(app config 등)와 동일 동작이면 화면에선 숨긴다(데이터엔 그대로).
function ovNorm(a){ return String(a||'').split('▸').pop().trim().replace(/[.…\s]+$/,'').toLowerCase(); }
function dedupeDisplay(ents){
  const byCombo={};
  ents.forEach(e=>{ const k=e.scope+'|'+[...e.mods].sort().join(',')+'|'+e.key+'|'+(e.ckey||''); (byCombo[k]=byCombo[k]||[]).push(e); });
  const drop=new Set();
  for(const k in byCombo){ const g=byCombo[k]; if(g.length<2) continue;
    const canon=new Set(g.filter(e=>e.source!=='app menu').map(e=>ovNorm(e.action)));  // 비-메뉴 소스가 가진 동작들
    if(canon.size) g.forEach(e=>{ if(e.source==='app menu' && canon.has(ovNorm(e.action))) drop.add(e); });
  }
  return drop.size ? ents.filter(e=>!drop.has(e)) : ents;
}
function effSym(){ return [...MODS,'fn'].filter(m=>eff.has(m)).map(m=>MODSYM[m]).join(''); }

function renderMeta(){
  const c=DB.meta.counts;
  document.getElementById('metaline').textContent =
    `생성 ${DB.meta.generated} · 총 ${DB.meta.total}개 · `+Object.entries(c).map(([k,v])=>`${k} ${v}`).join(' · ');
  document.getElementById('legend').innerHTML = Object.entries(COLORS)
    .map(([k,v])=>`<span><span class="dot" style="background:${v}"></span>${k}</span>`).join('')
    + `<span><span class="dot" style="background:#f59e0b"></span>같은 컨텍스트 겹침(+N)</span>`;
}
function renderChips(){
  document.getElementById('modchips').innerHTML = ['ctrl','opt','shift','cmd','fn'].map(m=>`<span class="chip" data-mod="${m}">${MODSYM[m]} ${m}</span>`).join('');
  document.querySelectorAll('[data-mod]').forEach(el=>el.onclick=()=>toggleMod(el.dataset.mod));
  document.querySelectorAll('[data-special]').forEach(el=>el.onclick=()=>{
    const set=el.dataset.special==='hyper'?['ctrl','opt','shift','cmd']:['ctrl','opt','shift'];
    const all=set.every(m=>sticky.has(m)); set.forEach(m=>all?sticky.delete(m):sticky.add(m)); sync();
  });
}
function toggleMod(m){ sticky.has(m)?sticky.delete(m):sticky.add(m); sync(); }
function renderCtx(){
  document.getElementById('ctxchips').innerHTML=['Global',...DB.meta.apps,'BTT (전체)',...(DB.meta.bttgroups||[])].map(a=>`<span class="chip" data-ctx="${a.replace(/"/g,'&quot;')}">${a}</span>`).join('');
  document.querySelectorAll('[data-ctx]').forEach(el=>el.onclick=()=>{ const c=el.dataset.ctx; ctxSet.has(c)?ctxSet.delete(c):ctxSet.add(c); sync(); });
  document.getElementById('filtersel').onchange=e=>{ filter=e.target.value; sync(); };
  document.getElementById('ovbtn').onclick=()=>{ overview=!overview; document.getElementById('ovbtn').classList.toggle('on',overview); sync(); if(overview) document.getElementById('overview').scrollIntoView({behavior:'smooth',block:'start'}); };
}
function enterChord(mods,key){          // ⌘K ▸ … 로 들어가 후속 키를 그리드에서 고르는 모드
  chordReturn={sticky:new Set(sticky), key:selectedKey, overview};
  chordPrefix={mods:[...mods], key};
  sticky=new Set(); held=new Set(); heldStr=''; selectedKey=null; overview=false;
  document.getElementById('ovbtn').classList.remove('on');
  sync(); window.scrollTo({top:0,behavior:'smooth'});
}
function exitChord(){
  if(!chordPrefix) return;
  const r=chordReturn; chordPrefix=null; chordReturn=null; held=new Set(); heldStr='';
  if(r){ sticky=r.sticky; selectedKey=r.key; overview=r.overview; document.getElementById('ovbtn').classList.toggle('on',overview); }
  sync();
}

function widthPx(w){ return (w*U-6)+'px'; }
function buildCap(spec){
  const [t,k,w,label]=spec;
  if(t==='gap'){ const g=document.createElement('div'); g.className='cap gap'; g.style.width=widthPx(w); return g; }
  if(t==='mod'){
    const el=document.createElement('div'); el.className='cap mod'; el.style.width=widthPx(w);
    el.innerHTML=`<div class="lab">${label}</div>`;
    el.classList.toggle('on',eff.has(k)); el.classList.toggle('held',held.has(k)&&!sticky.has(k));
    el.onclick=()=>toggleMod(k); return el;
  }

function parseQueryCombo(q){

  const r=document.getElementById('results');
  const keys=Object.keys(ANN.fav);
  if(!keys.length){ r.innerHTML='<div class="sec">⭐ 즐겨찾기 — 아직 없음. 키 클릭 → 하단 상세에서 ☆를 눌러 추가하세요.</div>'; r.scrollIntoView({behavior:'smooth',block:'start'}); return; }
  let html=`<div class="sec">⭐ 즐겨찾기 ${keys.length}개 — 외울 단축키 모음</div>`;
  keys.sort().forEach(ak=>{
    const i=ak.indexOf('|'), modstr=ak.slice(0,i), key=ak.slice(i+1), mods=modstr?modstr.split('+'):[];
    const matches=DB.entries.filter(e=>e.key===key && sameSet(e.mods,new Set(mods)));
    const act=matches.length?matches.map(e=>(e.ckey?'▸'+chordSym(e)+' ':'')+e.action).join(' / '):'(빈 조합)', note=ANN.note[ak]||'';
    html+=`<div class="row" data-jump="${ak}"><span class="kc">${comboSym(mods)||'(무수식)'}${key}</span>`
      +`<div style="flex:1">${act.replace(/</g,'&lt;')}${note?`<div class="noteshow">📝 ${note.replace(/</g,'&lt;')}</div>`:''}</div>`
      +`<span class="scope">${matches[0]?matches[0].scope:'free'}</span></div>`;
  });
  r.innerHTML=html;
  r.querySelectorAll('[data-jump]').forEach(el=>el.onclick=()=>{ const ak=el.dataset.jump,i=ak.indexOf('|'); chordPrefix=null; chordReturn=null; sticky=new Set(ak.slice(0,i)?ak.slice(0,i).split('+'):[]); held=new Set(); selectedKey=ak.slice(i+1); sync(); window.scrollTo({top:0,behavior:'smooth'}); });
  r.scrollIntoView({behavior:'smooth',block:'start'});
}
renderMeta(); renderChips(); renderCtx(); sync();
document.getElementById('search').oninput=e=>renderSearch(e.target.value.trim());
document.getElementById('favview').onclick=renderFavs;
document.getElementById('scopepos').onclick=()=>{ prefScopeRight=!prefScopeRight; localStorage.setItem('SVscopeRight',prefScopeRight?'1':'0'); if(selectedKey)showDetail(selectedKey); };
document.getElementById('annexport').onclick=()=>{ const b=new Blob([JSON.stringify(ANN,null,2)],{type:'application/json'}); const a=document.createElement('a'); a.href=URL.createObjectURL(b); a.download='shortcut-annotations.json'; a.click(); };
document.getElementById('annimport').onchange=e=>{ const f=e.target.files[0]; if(!f)return; const rd=new FileReader(); rd.onload=()=>{ try{ const j=JSON.parse(rd.result); Object.assign(ANN.fav,j.fav||{}); Object.assign(ANN.note,j.note||{}); saveAnn(); sync(); alert('가져왔습니다 ✓'); }catch(_){ alert('JSON 파싱 실패'); } }; rd.readAsText(f); };
</script>
