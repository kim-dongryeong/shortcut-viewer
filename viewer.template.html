<!doctype html>
<html lang="ko">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Ultimate Shortcut Viewer</title>
<style>
  :root{ --bg:#0f1115; --panel:#171a21; --line:#262b36; --txt:#e6e9ef; --dim:#8b93a3; --U:62px; }
  *{box-sizing:border-box}
  body{margin:0;background:var(--bg);color:var(--txt);font:14px/1.4 -apple-system,BlinkMacSystemFont,"SF Pro",Segoe UI,sans-serif}
  header{padding:14px 20px;border-bottom:1px solid var(--line);display:flex;gap:18px;align-items:baseline;flex-wrap:wrap}
  h1{font-size:16px;margin:0;font-weight:600}
  .meta{color:var(--dim);font-size:12px}
  .wrap{padding:18px 20px;max-width:1480px}
  .controls{display:flex;gap:9px;align-items:center;flex-wrap:wrap;margin-bottom:12px}
  .chip{padding:8px 13px;border:1px solid var(--line);border-radius:9px;background:var(--panel);cursor:pointer;user-select:none;font-size:15px}
  .chip.on{background:#2563eb;border-color:#2563eb;color:#fff}
  .chip.alt.on{background:#7c3aed;border-color:#7c3aed}
  .chip.held{box-shadow:0 0 0 2px #22d3ee inset}
  mark.hl{color:#111;border-radius:3px;padding:0 2px;font-weight:600}   /* 검색어 하이라이트 (배경색은 인라인) */
  .searchbox{position:relative;display:inline-flex;align-items:center}
  .searchbox #search{padding-right:26px}
  #searchclear{position:absolute;right:5px;border:none;background:transparent;color:var(--dim);cursor:pointer;font-size:14px;line-height:1;padding:3px 5px;border-radius:5px;display:none}
  #searchclear:hover{color:var(--txt);background:var(--line)}
  .searchbox.has #searchclear{display:block}
  #ctxchips .chip{padding:5px 9px;font-size:12px}
  #ctxchips .chip.on{background:#0d9488;border-color:#0d9488}
  .ctxbulk{display:flex;gap:6px;flex-basis:100%;margin-bottom:4px;padding-bottom:8px;border-bottom:1px solid var(--line);align-items:center}
  .ctxbulk .lbl{font-size:11px;color:var(--dim);margin-right:2px}
  .ctxbulk button,.ctxbulkbar button{font-size:11px;padding:3px 10px;border:1px solid var(--line);border-radius:6px;background:var(--bg);color:var(--dim);cursor:pointer}
  .ctxbulk button:hover,.ctxbulkbar button:hover{color:var(--txt);border-color:#0d9488}
  .ctxbulkbar{display:inline-flex;gap:6px;align-items:center}
  .ctxbulk button.on,.ctxbulkbar button.on{background:#0d9488;border-color:#0d9488;color:#fff}
  .ctxicon{width:15px;height:15px;border-radius:3px;vertical-align:-3px;margin-right:5px;object-fit:contain}
  select,input,button{background:var(--panel);color:var(--txt);border:1px solid var(--line);border-radius:9px;padding:8px 11px;font-size:14px}
  button{cursor:pointer}
  button.on{background:#2563eb;border-color:#2563eb}
  #favall.on,#favctx.on{background:#7c5e10;border-color:#e0a82e;color:#ffe9b3}   /* 즐겨찾기 뷰 버튼 켬 = 금색 */
  html[data-theme="light"] #favall.on,html[data-theme="light"] #favctx.on{background:#fde5b8;border-color:#c98a13;color:#7a4e00}
  input{min-width:200px}
  .combo{font-size:14px;color:var(--dim)}
  .combo b{color:var(--txt)}
  .hint{color:var(--dim);font-size:12px;margin:-2px 0 12px}
  .legend{display:flex;gap:14px;flex-wrap:wrap;margin:6px 0 14px;font-size:12px;color:var(--dim)}
  .dot{display:inline-block;width:10px;height:10px;border-radius:3px;margin-right:5px;vertical-align:-1px}
  .kb{display:flex;align-items:flex-start;gap:28px;flex-wrap:wrap}
  .kbmain{display:flex;flex-direction:column}
  .kbright{display:flex;flex-direction:column}
  .krow{display:flex;align-items:flex-start}
  .cap{position:relative;height:var(--caph,54px);margin:3px;border:1px solid var(--line);border-radius:8px;background:var(--panel);
       padding:4px 6px;overflow:hidden;display:flex;flex-direction:column;cursor:pointer;transition:transform .04s;flex:none}
  .cap:hover{transform:translateY(-1px);border-color:#3a4252}
  .cap .lab{font-size:10.5px;color:var(--dim);font-weight:700;white-space:nowrap}
  .cap .cnt{position:absolute;top:3px;right:5px;font-size:9px;color:var(--dim)}
  .cap .foot{display:flex;gap:3px;margin-top:2px;min-height:6px}
  .cap .fdot{width:6px;height:6px;border-radius:2px}
  .cap .act{font-size:9px;line-height:1.1;margin-top:auto;max-height:22px;overflow:hidden;color:#cdd3df}
  .cap.taken{border-color:#3a4252}
  .ov{font-size:8px;color:var(--dim);padding:0 3px;border-radius:4px;background:#222732;margin-left:2px}
  .ov.dup{color:#ef4444;background:#3a1414}   /* 같은 앱 내 충돌 = 빨강 (BTT 주황과 구분) */
  .cap.busy:not(.taken){border-color:#33405e}
  .cap.dim{opacity:.3}
  .cap.favmark{border-color:#e0a82e!important;box-shadow:inset 0 0 0 2px rgba(224,168,46,.4)}   /* 즐겨찾기 걸린 키 — 금색(검색/선택이 있으면 그쪽이 덮어씀) */
  .cap.favmark .lab{color:#f5c451}
  .cap.shit{border-color:#fbbf24!important;box-shadow:0 0 0 2px #f59e0b,0 0 12px rgba(245,158,11,.5);z-index:2}   /* 검색어 매치 키 강조 */
  .cap.shit .lab{color:#fcd34d}
  .cap.shide{opacity:.08;filter:grayscale(1)}   /* 검색 필터 모드: 비매치 키 숨김(강하게 흐림) */
  .cap.freehl{border-color:#3d9e6b!important}   /* 빈 키: 차분한 초록 테두리 (글로우 없음) */
  .cap.freehl .lab{color:#7fca9f}
  .cap .bar{position:absolute;left:0;bottom:0;height:3px;width:100%}
  .cap.mod{align-items:center;justify-content:center;color:var(--dim);background:#12151b}
  .cap.mod.on{background:#2563eb;border-color:#2563eb;color:#fff}
  .cap.mod.held{box-shadow:0 0 0 2px #22d3ee inset}
  .cap.gap{border:none;background:none;cursor:default}
  .cap.sel{border-color:#7dd3fc!important;box-shadow:0 0 0 2px #38bdf8, 0 0 16px rgba(56,189,248,.55);z-index:3;transform:translateY(-1px)}
  .cap.sel .lab{color:#7dd3fc}
  .cap.sel .act{color:#e6f6ff}
  .arrows{display:flex;align-items:flex-end;margin-left:4px}
  .updown{display:flex;flex-direction:column}
  .sec{color:var(--dim);font-size:11px;text-transform:uppercase;letter-spacing:.06em;margin:16px 0 6px}
  .panel{margin-top:18px;border-top:1px solid var(--line);padding-top:14px}
  .row{display:flex;gap:10px;align-items:flex-start;padding:7px 0;border-bottom:1px solid var(--line)}
  .row.hi{background:#0b2a45;box-shadow:inset 3px 0 0 #38bdf8;border-radius:4px}
  .row .src,.drow .src{font-size:11px;padding:2px 7px;border-radius:6px;color:#0b0d11;font-weight:700;white-space:nowrap}
  .dent+.dent{margin-top:4px}
  .dent{content-visibility:auto;contain-intrinsic-size:auto 34px}   /* 긴 리스트(예: ⌘K 채드 103개) 스크롤 성능 — 화면 밖 행은 렌더 건너뜀 */
  .row{content-visibility:auto;contain-intrinsic-size:auto 40px}
  .row .kc{font-weight:700;white-space:nowrap;min-width:66px}
  .row.hi .kc{color:#7dd3fc}
  .row .scope,.drow .scope{color:var(--dim);font-size:12px;white-space:nowrap;display:inline-flex;align-items:center}
  .scopeicon{width:14px;height:14px;border-radius:3px;margin-right:4px;object-fit:contain;flex:none;vertical-align:-2px}
  .glico{margin-right:3px;font-size:12px;line-height:1}
  .cl .scope{display:inline-flex;align-items:center}
  .muted{color:var(--dim)}
  #results .row,#overview .row{cursor:pointer}
  #results .row:hover,#overview .row:hover{background:#1b1f28}
  .empty{color:var(--dim);padding:14px 0}
  .tip{position:fixed;z-index:60;background:#0b0d11;border:1px solid var(--line);border-radius:9px;padding:9px 11px;
       max-width:360px;font-size:12px;pointer-events:none;box-shadow:0 10px 30px rgba(0,0,0,.55);display:none}
  .tip .tl{display:flex;gap:8px;padding:2px 0}
  .tip .tl b{min-width:58px;color:#cfe}
  .grp{margin:10px 0 4px;font-weight:700}
  .ovwrap{column-width:310px;column-gap:20px;margin-top:6px}
  .ovgrp{break-inside:avoid;-webkit-column-break-inside:avoid;margin:0 0 14px}
  .ovgrp .gh{font-weight:700;color:#7dd3fc;border-bottom:1px solid var(--line);padding-bottom:3px;margin-bottom:3px;font-size:13px}
  .cs{display:flex;gap:8px;align-items:baseline;padding:2px 4px;border-radius:5px;cursor:pointer;content-visibility:auto;contain-intrinsic-size:auto 22px}
  .cs:hover{background:#1b1f28}
  .cs.hi{background:#0b2a45;box-shadow:inset 3px 0 0 #38bdf8}
  .cs.hi .csk{color:#7dd3fc}
  .cs.softhi{background:rgba(56,189,248,.12)}   /* 같은 일반키의 다른 수식키 조합 = 약한 강조 */
  .cs.softhi .csk{color:#9dd8f5}
  .cs .csk{font-weight:700;min-width:72px;white-space:nowrap}
  .cs .csa{flex:1;min-width:0;color:#cdd3df;font-size:12.5px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
  .cs .csd{width:7px;height:7px;border-radius:50%;flex:none;align-self:center}
  .cs.exp{align-items:flex-start}
  .cs.exp .csa{white-space:normal;overflow:visible;text-overflow:clip}   /* 확장 시 액션 줄바꿈 + 2번째 줄 */
  .csdet{font-size:10.5px;color:var(--dim);white-space:normal;line-height:1.35;margin-top:1px}
  .ovtab{display:inline-flex;gap:4px;margin-left:10px;text-transform:none;letter-spacing:0}
  .ovtab button{font-size:11px;padding:2px 9px;border:1px solid var(--line);border-radius:6px;background:var(--panel);color:var(--dim);cursor:pointer}
  .ovtab button.on{background:#0b2a45;border-color:#38bdf8;color:#7dd3fc}
  .annm{position:absolute;top:3px;right:17px;font-size:9px;line-height:1}
  .chord{color:#7dd3fc;font-weight:700;white-space:nowrap}
  .chordm{font-size:8px;color:#7dd3fc;font-weight:700;margin-left:auto}
  .chordbtn{font-size:11px;padding:2px 7px;border:1px solid #38bdf8;border-radius:6px;background:#0b2a45;color:#7dd3fc;cursor:pointer;font-weight:700;white-space:nowrap}
  #gestures{margin:6px 0 2px}
  .gwrap{display:flex;flex-wrap:wrap;gap:8px;margin-top:4px}
  .gcard{display:flex;align-items:center;gap:9px;border:1px solid var(--line);border-radius:10px;padding:7px 12px;background:var(--panel)}
  .gcard.hi{border-color:#38bdf8;background:#0b2a45;box-shadow:inset 3px 0 0 #38bdf8}
  .gsym{font-weight:800;font-size:16px;color:#7dd3fc;white-space:nowrap}
  .gsym .gtag{font-size:10px;color:var(--dim);font-weight:700;border:1px solid var(--line);border-radius:4px;padding:0 3px;vertical-align:middle}
  .gact{font-size:13px;color:#cdd3df}
  .gsrc{font-size:11px;color:var(--dim);display:inline-flex;align-items:center;gap:4px}
  .gsrc .fdot{display:inline-block;width:6px;height:6px;border-radius:2px}
  #chordbar{background:#0b2a45;border:1px solid #38bdf8;border-radius:9px;padding:10px 14px;margin:8px 0;color:#cfe;font-size:14px}
  #chordbar .x{text-decoration:underline;cursor:pointer;color:#7dd3fc;font-weight:700}
  .drow{display:flex;gap:8px;align-items:flex-start;padding:6px 0;border-bottom:1px solid var(--line)}
  .drow.hi{background:#0b2a45;box-shadow:inset 3px 0 0 #38bdf8;border-radius:4px}
  .drow .kc{font-weight:700;white-space:nowrap;min-width:62px}
  .drow .dbody{flex:1}
  .favbtn{background:none;border:none;color:#f59f00;cursor:pointer;font-size:14px;padding:0 2px;line-height:1.3}
  .favbtn.on{filter:drop-shadow(0 0 3px #ffd43b)}
  .notebtn{background:var(--panel);border:1px solid var(--line);border-radius:6px;color:var(--dim);cursor:pointer;font-size:11px;padding:2px 7px;white-space:nowrap}
  .noteshow{color:#ffd8a8;font-size:11px;margin-top:2px}
  .impbtn{display:inline-flex;align-items:center;padding:8px 11px;border:1px solid var(--line);border-radius:9px;background:var(--panel);cursor:pointer;font-size:14px}
  /* ── light theme (KeyCue 식 밝은 테마 + 인쇄) ── */
  html[data-theme="light"]{ --bg:#f6f7f9; --panel:#fff; --line:#d7dbe2; --txt:#1b2028; --dim:#67707e; }
  html[data-theme="light"] .cap.mod{background:#eef1f5}
  html[data-theme="light"] .row.hi,html[data-theme="light"] .cs.hi,html[data-theme="light"] .drow.hi,html[data-theme="light"] .gcard.hi,html[data-theme="light"] .cap.sel{background:#e0f2fe}
  html[data-theme="light"] .cap.sel .lab,html[data-theme="light"] .cs.hi .csk,html[data-theme="light"] .row.hi .kc{color:#0369a1}
  /* ── new-view panels (충돌·빈조합·통계·퀴즈) ── */
  .vbar{display:flex;gap:7px;flex-wrap:wrap;align-items:center;margin:2px 0 10px}
  .vbtn{font-size:13px;padding:6px 12px;border:1px solid var(--line);border-radius:8px;background:var(--panel);color:var(--txt);cursor:pointer}
  .vbtn.on{background:#0b2a45;border-color:#38bdf8;color:#7dd3fc}
  html[data-theme="light"] .vbtn.on{background:#e0f2fe;color:#0369a1}
  .conf{border:1px solid var(--line);border-left:3px solid #f59e0b;border-radius:8px;padding:8px 12px;margin:6px 0;background:var(--panel)}
  .conf .ck{font-weight:800;font-size:15px;margin-bottom:4px}
  .conf .cl{display:flex;gap:8px;align-items:baseline;padding:2px 0}
  .conf .cl .src{font-size:11px;padding:1px 6px;border-radius:5px;color:#0b0d11;font-weight:700}
  .freegrid{display:flex;flex-wrap:wrap;gap:6px;margin-top:6px}
  .freek{min-width:40px;text-align:center;padding:9px 8px;border:1px solid var(--line);border-radius:8px;background:var(--panel);font-weight:700;cursor:pointer}
  .freek:hover{border-color:#38bdf8}
  .freek.home{border-color:#22c55e;box-shadow:inset 0 0 0 1px #22c55e33}
  .statrow{display:flex;align-items:center;gap:9px;padding:3px 0;font-size:13px}
  .statrow .sl{min-width:150px;color:var(--dim);white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
  .statbar{height:14px;border-radius:4px;background:#38bdf8;min-width:2px}
  .statrow .sv{color:var(--txt);font-variant-numeric:tabular-nums;min-width:44px}
  .quiz{max-width:560px;margin:10px 0;border:1px solid var(--line);border-radius:12px;padding:20px;background:var(--panel);text-align:center}
  .quiz .qa{font-size:20px;font-weight:700;margin:6px 0 14px}
  .quiz .qp{font-size:26px;font-weight:800;color:#7dd3fc;letter-spacing:1px;min-height:34px}
  .quiz .qs{color:var(--dim);font-size:13px;margin-top:12px}
  .quiz .qok{color:#22c55e} .quiz .qng{color:#ef4444}
  .quiz button{margin:12px 6px 0}
  kbd{font:inherit;background:var(--bg);border:1px solid var(--line);border-radius:5px;padding:1px 6px}
  .delx{color:#ef4444;cursor:pointer;font-weight:700;padding:0 4px;font-size:12px}
  .delx:hover{color:#f87171}
  /* 글로벌 핫키 빌더 */
  .ghkform{border:1px solid var(--line);border-radius:12px;padding:16px;background:var(--panel);max-width:760px;margin:8px 0 14px}
  .ghkrow{display:flex;gap:10px;align-items:center;flex-wrap:wrap;margin:7px 0}
  .ghkrow>label{min-width:52px;color:var(--dim);font-size:13px}
  .ghkform input[type=text],.ghkform select{flex:1;min-width:140px}
  .ghkmods{display:inline-flex;gap:5px}
  .ghkmods .mb{padding:6px 11px;border:1px solid var(--line);border-radius:8px;background:var(--bg);cursor:pointer;font-size:15px;user-select:none}
  .ghkmods .mb.on{background:#7c3aed;border-color:#7c3aed;color:#fff}
  .ghkkey{width:64px!important;flex:none!important;text-align:center;font-weight:700;text-transform:uppercase}
  .ghkstatus{font-size:13px;padding:8px 11px;border-radius:8px;margin:8px 0 0}
  .ghkstatus.free{background:#0d2a18;color:#4ade80;border:1px solid #16643a}
  .ghkstatus.taken{background:#2a1a0d;color:#fbbf24;border:1px solid #78450f}
  html[data-theme="light"] .ghkstatus.free{background:#dcfce7;color:#166534;border-color:#86efac}
  html[data-theme="light"] .ghkstatus.taken{background:#fef3c7;color:#92400e;border-color:#fcd34d}
  .ghkadd{background:#7c3aed;border-color:#7c3aed;color:#fff;font-weight:700}
  .ghklist{margin-top:6px}
  .ghkitem{display:flex;gap:10px;align-items:center;padding:8px 10px;border:1px solid var(--line);border-radius:9px;margin:5px 0;background:var(--panel)}
  .ghkicon{width:26px;height:26px;border-radius:50%;display:inline-flex;align-items:center;justify-content:center;font-size:13px;flex:none;filter:saturate(1.1)}
  .ghkitem .gk{font-weight:800;min-width:78px;color:#c4b5fd}
  html[data-theme="light"] .ghkitem .gk{color:#6d28d9}
  .ghkitem .gt{flex:1}
  .ghkitem .gy{font-size:11px;color:var(--dim);padding:2px 7px;border:1px solid var(--line);border-radius:6px}
  .ghkbackends{margin-top:14px;border-top:1px solid var(--line);padding-top:12px}
  .ghkbackends pre{background:var(--bg);border:1px solid var(--line);border-radius:8px;padding:10px;overflow:auto;font-size:11.5px;max-height:200px}
  .ghktabs{display:inline-flex;gap:5px;margin:6px 0}
  .ghktabs button{font-size:12px;padding:3px 10px;border:1px solid var(--line);border-radius:6px;background:var(--panel);color:var(--dim);cursor:pointer}
  .ghktabs button.on{background:#2e1065;border-color:#7c3aed;color:#c4b5fd}
  html[data-theme="light"] .ghktabs button.on{background:#ede9fe;color:#6d28d9}
  @media print{
    html{--bg:#fff;--panel:#fff;--line:#bbb;--txt:#000;--dim:#555}
    header,.controls,.hint,.vbar,#chordbar,#gestures,.tip,#kb,#detail,#results,#legend{display:none!important}
    .wrap{max-width:none;padding:0}
    #overview{display:block!important}
    .ovwrap{column-width:250px}
    .cs{break-inside:avoid} .ovgrp{break-inside:avoid}
    .cs .csa{white-space:normal}
  }
</style>
</head>
<body>
<header>
  <h1>⌨️ Ultimate Shortcut Viewer</h1>
  <span class="meta" id="metaline"></span>
</header>

<div class="wrap">
  <div class="controls">
    <span id="modchips"></span>
    <span class="searchbox"><input id="search" placeholder="🔍 검색: 동작/키/조합"><button id="searchclear" title="검색어 지우기 (Esc)" tabindex="-1">✕</button></span>
    <button id="ovbtn" title="선택한 컨텍스트의 모든 단축키를 한 번에 (KeyCue 식 치트시트)">📋 전체 단축키</button>
    <button id="favall" title="모든 즐겨찾기를 키보드에 ⭐로 표시하고 아래에 리스트로 보여줍니다 (현재 컨텍스트와 무관). 다시 누르면 끕니다.">⭐ 전체 즐겨찾기</button>
    <button id="favctx" title="현재 선택한 컨텍스트에 해당하는 즐겨찾기만 키보드·리스트로 보여줍니다. 다시 누르면 끕니다.">⭐ 현재 컨텍스트</button>
    <button id="moretoggle" title="테마·인쇄·내보내기·내 단축키 등 더 많은 도구">⋯ 더보기</button>
  </div>
  <div class="controls" style="margin-top:-4px">
    <span class="meta" style="align-self:center">컨텍스트:</span>
    <button id="ctxtoggle" title="앱/컨텍스트 목록 펼치기">▾ 앱 선택</button>
    <span id="ctxbulkbar" class="ctxbulkbar"></span>
    <span id="ctxsummary" class="meta" style="align-self:center;color:#7dd3fc"></span>
    <span id="ctxchips" style="display:none;flex-wrap:wrap;gap:5px;flex-basis:100%;margin-top:6px;border:1px solid var(--line);border-radius:10px;padding:10px 12px;background:var(--panel)"></span>
  </div>

<script>
const DB = /*__DATA__*/;
// ── favorites + notes, persisted in localStorage (survives rebuilds at the same file path) ──
let ANN = {fav:{}, note:{}, custom:[], ghk:[]};
try { const base=DB.ann||{}; Object.assign(ANN.fav, base.fav||{}); Object.assign(ANN.note, base.note||{}); if(Array.isArray(base.custom)) ANN.custom=base.custom; if(Array.isArray(base.ghk)) ANN.ghk=base.ghk; } catch(e){}  // baked-in (annotations.json)
try { const s=JSON.parse(localStorage.getItem('SVann')||'null'); if(s){ Object.assign(ANN.fav,s.fav||{}); Object.assign(ANN.note,s.note||{}); if(Array.isArray(s.custom)) ANN.custom=s.custom; if(Array.isArray(s.ghk)) ANN.ghk=s.ghk; } } catch(e){}  // live localStorage overlay
// ── 내 단축키(custom): 어떤 소스에도 없는 걸 직접 기록 → DB.entries에 병합 (localStorage에 저장·export 포함) ──
function mergeCustom(){
  DB.entries = DB.entries.filter(e=>e.source!=='custom');
  (ANN.custom||[]).forEach(c=>{ if(!c.id) c.id='c'+Math.random().toString(36).slice(2,9);
    DB.entries.push({mods:c.mods||[], key:c.key, action:c.action||'(custom)', source:'custom', scope:c.scope||'global', detail:'내가 추가한 단축키', group:c.scope||'custom', _cid:c.id}); });
}
function addCustom(){
  const combo=prompt('단축키 조합 (예: opt+shift+X · cmd+K · F13):'); if(!combo) return;
  let pc=parseQueryCombo(combo); if(!pc){ const k=combo.trim().replace(/\s/g,''); pc={mods:[],key:k.length===1?k.toUpperCase():(k.charAt(0).toUpperCase()+k.slice(1))}; }
  const action=prompt('이 단축키의 동작/설명 (예: Raycast 창 열기):'); if(action===null) return;
  let scope=(prompt('앱/스코프 (비우면 Global — 예: Raycast, Figma):','')||'').trim();
  if(!scope || scope.toLowerCase()==='global') scope='global';   // 'Global'/'global' → 정규화(중복 칩 방지)
  ANN.custom.push({mods:pc.mods||[], key:pc.key, action:action.trim()||'(custom)', scope});
  saveAnn(); mergeCustom(); renderCtx(); sync();
}
function delCustom(id){ ANN.custom=(ANN.custom||[]).filter(c=>c.id!==id); saveAnn(); mergeCustom(); renderCtx(); if(selectedKey) showDetail(selectedKey); sync(); }
function saveAnn(){ try { localStorage.setItem('SVann', JSON.stringify(ANN)); } catch(e){} }
function annKey(mods, key){ return [...mods].sort().join('+') + '|' + key; }   // 조합 단위(노트·레거시 즐겨찾기)
// 즐겨찾기는 '단축키 원소 하나' 단위 — 조합이 같아도 동작/소스/스코프로 구분 (VS Code ⌥K 2개 등을 따로 별표)
function eid(e){ const M=e._okey!==undefined;   // 채드 리매핑 엔트리(_o*)는 원래 채드(⌘K→M) 식별자로 별표해야 평탄화 안 됨
  const mods=M?e._omods:e.mods, key=M?e._okey:e.key, cmods=M?e._ocmods:e.cmods, ckey=M?e._ockey:e.ckey;
  return JSON.stringify([[...(mods||[])].sort().join('+'), key, cmods?[...cmods].sort().join('+'):'', ckey||'', e.action||'', e.source||'', e.scope||'']); }
function favParse(fk){ try{ const a=JSON.parse(fk); if(Array.isArray(a)&&a.length>=7) return {mods:a[0]?a[0].split('+'):[], key:a[1], cmods:a[2]?a[2].split('+'):null, ckey:a[3]||null, action:a[4], source:a[5], scope:a[6]}; }catch(_){} return null; }   // 엔트리 즐겨찾기 키 파싱(레거시 조합키면 null)
function scopeIcon(scope){   // 스코프(앱) 옆 아이콘 — 🖼 앱 아이콘 토글과 연동. global은 🌐
  if(!showIcons || !scope) return '';
  if(scope==='global'||scope==='Global') return '<span class="glico">🌐</span>';
  const u=(DB.meta.icons||{})[scope];
  return u ? `<img class="scopeicon" src="${u}" alt="">` : ''; }
let prefScopeRight = localStorage.getItem('SVscopeRight')!=='0';  // 상세 패널 스코프(global/chrome 등) 위치: 오른쪽 정렬(기본) vs 왼쪽 인라인
let ovGroup = ['mod','key','source'].includes(localStorage.getItem('SVovGroup')) ? localStorage.getItem('SVovGroup') : 'mod';  // 전체 단축키 치트시트 묶음 기준 (잘못된 저장값은 'mod'로)
const COLORS = {system:'#3b82f6','app menu':'#9ca3af','app config':'#14b8a6',Karabiner:'#22c55e',BTT:'#f59e0b',Raycast:'#a855f7',web:'#06b6d4',custom:'#ec4899'};
const MODS = ['ctrl','opt','shift','cmd'];
const MODSYM = {ctrl:'⌃',opt:'⌥',shift:'⇧',cmd:'⌘',fn:'🌐',caps:'⇪'};
const KEY_SIZES=[46,56,68];   // 레거시 프리셋 — 이제 슬라이더로 연속 조절(폭·높이 모두 U가 구동)
let U = (()=>{ const s=+localStorage.getItem('SVkeyU'); if(s>=36 && s<=110) return s;   // 슬라이더로 저장한 연속 크기(px)
  const i=[0,1,2].includes(+localStorage.getItem('SVkeySize'))?+localStorage.getItem('SVkeySize'):1; return KEY_SIZES[i]; })();   // 예전 3단계 설정 폴백
// physical-ish ANSI Mac layout. t:'key' = shortcut key, t:'mod' = modifier toggle, t:'gap' = spacer.
const LAYOUT = [
  [['key','Escape',1,'esc'],['gap',0,0.4],['key','F1',1],['key','F2',1],['key','F3',1],['key','F4',1],['gap',0,0.3],
   ['key','F5',1],['key','F6',1],['key','F7',1],['key','F8',1],['gap',0,0.3],['key','F9',1],['key','F10',1],['key','F11',1],['key','F12',1]],
  [['key','`',1],['key','1',1],['key','2',1],['key','3',1],['key','4',1],['key','5',1],['key','6',1],['key','7',1],['key','8',1],
   ['key','9',1],['key','0',1],['key','-',1],['key','=',1],['key','Delete',2,'⌫ delete']],
  [['key','Tab',1.5,'⇥ tab'],['key','Q',1],['key','W',1],['key','E',1],['key','R',1],['key','T',1],['key','Y',1],['key','U',1],
   ['key','I',1],['key','O',1],['key','P',1],['key','[',1],['key',']',1],['key','\\',1.5]],
  [['key','CapsLock',1.75,'⇪ caps'],['key','A',1],['key','S',1],['key','D',1],['key','F',1],['key','G',1],['key','H',1],['key','J',1],
   ['key','K',1],['key','L',1],['key',';',1],['key',"'",1],['key','Return',2.25,'⏎ return']],
  [['mod','shift',2.25,'⇧ shift'],['key','Z',1],['key','X',1],['key','C',1],['key','V',1],['key','B',1],['key','N',1],['key','M',1],
   ['key',',',1],['key','.',1],['key','/',1],['mod','shift',2.75,'⇧ shift']],
  [['mod','fn',1,'fn'],['mod','ctrl',1.1,'⌃ ctrl'],['mod','opt',1.1,'⌥ opt'],['mod','cmd',1.25,'⌘ cmd'],['key','Space',6.5,''],
   ['mod','cmd',1.25,'⌘ cmd'],['mod','opt',1.1,'⌥ opt']],
];
const NAV = ['Home','End','PageUp','PageDown','ForwardDelete'];
const FEXT = ['F13','F14','F15','F16','F17','F18','F19','F20'];

let sticky=new Set(), held=new Set(), heldStr='', ctxSet=new Set(['Global']), filter='all', eff=new Set(), overview=false, selectedKey=null;
let chordPrefix=null, chordReturn=null, CUR=null;   // which-key(연속) 모드: chordPrefix={mods,key}면 그리드가 그 prefix의 후속(2nd) 키 집합으로 바뀐다
let panelMode=null;   // 새 전용 뷰: 'conflicts'|'free'|'stats'|'quiz'|null
let theme = localStorage.getItem('SVtheme')==='light' ? 'light' : 'dark';
document.documentElement.setAttribute('data-theme', theme);
let hideCommon = localStorage.getItem('SVhideCommon')==='1';   // 누구나 아는 흔한 단축키(⌘C/V/Z…) 숨기기
let showIcons = localStorage.getItem('SVicons')!=='0';          // 컨텍스트 칩에 앱 아이콘 표시 (기본 ON, '0'이면 끔)
let captureKeys = localStorage.getItem('SVcapture')!=='0';      // 키 입력을 낚아채 레이아웃에 반영 (기본 ON). 끄면 ⌘C 복사 등 정상 동작
let searchGridMode = localStorage.getItem('SVsearchGrid')==='filter' ? 'filter' : 'highlight';   // 검색어 입력 시 키보드 그리드: 강조만 / 강조+숨김
let SEARCHKEYS = null;   // 현재 검색어가 매치하는 키 집합(그리드 강조/숨김용). null=검색 없음
let favMode = (localStorage.getItem('SVfavMode') ?? 'all') || null;   // 'all'=전체 즐겨찾기 · 'ctx'=현재 컨텍스트 · null=끔. 첫 방문 기본 '전체'
let FAVKEYS = null;   // favMode일 때 즐겨찾기가 걸린 그리드 키 집합(키보드 ⭐ 강조용). null=끔
let searchListMode = localStorage.getItem('SVsearchList')==='filter' ? 'filter' : 'highlight';   // 상세(수식키 조합별) 리스트: 강조만 / 강조+숨김
let DKWS = [];   // 현재 검색 키워드(상세 리스트 하이라이트용) — showDetail에서 세팅
let DFILTER = false;   // true면 detailRow가 searchListMode와 무관하게 매치 항목만(모아 보기용)
let ovExpand = localStorage.getItem('SVovExpand')==='1';   // 전체단축키: 각 항목의 2번째 줄(detail)도 표시
const COMMON_COMBOS = new Set(['cmd|C','cmd|V','cmd|X','cmd|Z','cmd|A','cmd|S','cmd|F','cmd|P','cmd|W','cmd|Q','cmd|N','cmd|O','cmd|T','cmd+shift|Z','cmd+shift|T']);
function isCommon(e){ return !e.ckey && COMMON_COMBOS.has([...e.mods].sort().join('+')+'|'+e.key); }

function recompute(){
  eff=new Set([...sticky,...held]);
  CUR = chordPrefix
    ? DB.entries.filter(e=> e.ckey && e.key===chordPrefix.key && sameSet(e.mods,new Set(chordPrefix.mods)) && inCtx(e))
                .map(e=>({mods:e.cmods||[], key:e.ckey, action:e.action, source:e.source, scope:e.scope, detail:e.detail, _omods:e.mods, _okey:e.key, _ocmods:e.cmods, _ockey:e.ckey}))  // 후속 누름을 일반 엔트리처럼 리매핑(_o*=원래 채드 식별자, 즐겨찾기 eid용)
    : ctxEntries();
}
function sameSet(arr,set){ if(arr.length!==set.size) return false; for(const m of arr) if(!set.has(m)) return false; return true; }
function inCtx(e){ return (e.scope==='global' && ctxSet.has('Global')) || ctxSet.has(e.scope) || ctxSet.has(e.group) || (ctxSet.has('BTT (전체)') && e.source==='BTT'); }
function keyAll(key){ return (CUR||(CUR=ctxEntries())).filter(e=>e.key===key); }
function matchEff(key){ return keyAll(key).filter(e=>sameSet(e.mods,eff)); }
function comboSym(mods){ return [...MODS,'fn'].filter(m=>mods.includes(m)).map(m=>MODSYM[m]).join(''); }
function chordSym(e){ return e&&e.ckey ? (comboSym(e.cmods||[])+e.ckey) : ''; }                 // 2nd press, 예: ⌘I
// 키 정렬 순서 — 알파벳/숫자/F키 다음에 화살표·nav를 각각 '뭉쳐서'. 화살표가 D/L/R/U로 흩어지지 않게.
const _ARROW={Up:0,Down:1,Left:2,Right:3}, _NAV={Home:0,End:1,PageUp:2,PageDown:3,Delete:4,ForwardDelete:5,Return:6,Tab:7,Space:8,Escape:9};
function keyOrd(k){ if(!k) return '0';
  if(/^[A-Za-z]$/.test(k)) return '1_'+k.toUpperCase();
  if(/^\d$/.test(k)) return '2_'+k;
  if(/^F\d+$/.test(k)) return '3_'+String(+k.slice(1)).padStart(2,'0');
  if(k in _ARROW) return '4_'+_ARROW[k];   // ↑↓←→ 뭉치
  if(k in _NAV) return '5_'+_NAV[k];
  return '6_'+k; }
function chordTag(e){ return e&&e.ckey ? `<span class="chord">▸ ${chordSym(e)}</span>` : ''; }   // 리더 메뉴 배지
// 표시용 중복 제거: 같은 스코프·조합에서 'app menu' 항목이 다른 소스(app config 등)와 동일 동작이면 화면에선 숨긴다(데이터엔 그대로).
function ovNorm(a){ return String(a||'').split('▸').pop().trim().replace(/[.…\s]+$/,'').toLowerCase(); }
function dedupeDisplay(ents){
  const byCombo={};
  ents.forEach(e=>{ const k=e.scope+'|'+[...e.mods].sort().join(',')+'|'+e.key+'|'+(e.ckey||''); (byCombo[k]=byCombo[k]||[]).push(e); });
  const drop=new Set();
  for(const k in byCombo){ const g=byCombo[k]; if(g.length<2) continue;
    const canon=new Set(g.filter(e=>e.source!=='app menu').map(e=>ovNorm(e.action)));  // 비-메뉴 소스가 가진 동작들
    if(canon.size) g.forEach(e=>{ if(e.source==='app menu' && canon.has(ovNorm(e.action))) drop.add(e); });
  }
  return drop.size ? ents.filter(e=>!drop.has(e)) : ents;
}
function effSym(){ return [...MODS,'fn'].filter(m=>eff.has(m)).map(m=>MODSYM[m]).join(''); }

function renderMeta(){
  const c=DB.meta.counts;
  document.getElementById('metaline').textContent =
    `생성 ${DB.meta.generated} · 총 ${DB.meta.total}개 · `+Object.entries(c).map(([k,v])=>`${k} ${v}`).join(' · ');
  document.getElementById('legend').innerHTML = Object.entries(COLORS)
    .map(([k,v])=>`<span title="${k==='web'?'제조사 공식문서에서 fetch·파싱 (로컬 스캔 아님)':''}"><span class="dot" style="background:${v}"></span>${k==='web'?'web=공식문서 fetch(스캔 아님)':k}</span>`).join('')
    + `<span><span class="dot" style="background:#ef4444"></span>같은 앱 내 충돌(+N)</span>`;
}
function renderChips(){
  document.getElementById('modchips').innerHTML = ['ctrl','opt','shift','cmd','fn'].map(m=>`<span class="chip" data-mod="${m}">${MODSYM[m]} ${m}</span>`).join('');
  document.querySelectorAll('[data-mod]').forEach(el=>el.onclick=()=>toggleMod(el.dataset.mod));

function widthPx(w){ return (w*U-6)+'px'; }
function buildCap(spec){
  const [t,k,w,label]=spec;

  if(t==='mod'){
    const el=document.createElement('div'); el.className='cap mod'; el.style.width=widthPx(w);
    el.innerHTML=`<div class="lab">${label}</div>`;
    el.classList.toggle('on',eff.has(k)); el.classList.toggle('held',held.has(k)&&!sticky.has(k));

function cellKey(key,label,wpx){
  const all=keyAll(key), ms=matchEff(key);

  if(all.length) h+=`<span class="cnt">${all.length}</span>`;   // 개수 힌트 — 항상 (이 키에 단축키 몇 개)
  const srcs=[...new Set(all.map(e=>e.source))];
  const chc=all.filter(e=>e.ckey).length;   // chord 시작(연속) 개수
  h+=`<div class="foot">`+srcs.map(s=>`<span class="fdot" style="background:${COLORS[s]||'#666'}"></span>`).join('')
    +(chc?`<span class="chordm" title="${chc}개 연속(chord) 시작">▸${chc}</span>`:'')+`</div>`;   // 색동그라미(소스별) — 항상
  if(all.length) el.classList.add('busy');
  // 현재 레이어(eff)에 걸린 단축키는 라벨·색바로 표시 — 무수식 레이어도 포함(원래 동작). '활성 레이어 강조'는
  // 상세 패널의 .drow.hi로만 하고, 그건 수식키를 실제로 누른 경우에만(showDetail의 hit 참조).
  if(ms.length){
    el.classList.add('taken');
    const scc={}; ms.forEach(m=>scc[m.scope]=(scc[m.scope]||0)+1);
    const dup=Object.values(scc).some(v=>v>=2);
    h+=`<div class="act">${ms[0].action.replace(/</g,'&lt;')}`+(ms.length>1?` <span class="ov${dup?' dup':''}">+${ms.length-1}</span>`:``)+`</div>`;
    h+=`<div class="bar" style="background:${COLORS[ms[0].source]||'#666'}"></div>`;
    if(filter==='free') el.classList.add('dim');
  } else { h+=`<div class="act muted">·</div>`; if(filter==='taken') el.classList.add('dim'); }
  if(SEARCHKEYS){   // 검색어 매치: 매치 키 강조 / 필터 모드면 비매치 키 숨김
    if(SEARCHKEYS.has(key)) el.classList.add('shit');
    else if(searchGridMode==='filter') el.classList.add('shide');
  }
  if(FAVKEYS && FAVKEYS.has(key)) el.classList.add('favmark');   // 즐겨찾기 걸린 키 — 금색 강조 (레이어 무관)
  if(key===selectedKey) el.classList.add('sel');
  if(panelMode==='free' && !ms.length) el.classList.add('freehl');   // 빈 조합 모드: 이 레이어에서 빈 키를 초록 테두리로 그리드에 직접 표시
  const _ak=annKey([...eff],key);
  const _fav = ANN.fav[_ak] || ms.some(e=>ANN.fav[eid(e)]);   // 조합의 단축키 중 하나라도 별표면 표시 (엔트리 단위 + 레거시 조합)
  if(_fav||ANN.note[_ak]) h+=`<span class="annm">${_fav?'⭐':''}${ANN.note[_ak]?'📝':''}</span>`;
  el.innerHTML=h;
  el.onclick=()=>{ selectedKey = (key===selectedKey ? null : key); sync(); };   // 같은 키 다시 클릭하면 해제
  el.onmouseenter=ev=>showTip(ev,key,all); el.onmousemove=moveTip; el.onmouseleave=hideTip;
  return el;
}

const HLCOLORS = ['#fde047','#7dd3fc','#86efac','#f0abfc','#fdba74','#fca5a5'];   // 검색어별 하이라이트 색 (노랑·하늘·초록·분홍·주황·빨강)
function hlText(text, kws){   // 각 키워드 매치를 서로 다른 색 <mark>로 (한 번에 치환해 태그 안쪽 오염 방지)
  const safe=String(text||'').replace(/&/g,'&amp;').replace(/</g,'&lt;');
  const v=(kws||[]).filter(Boolean); if(!v.length) return safe;
  const re=new RegExp('('+v.map(k=>k.replace(/[.*+?^${}()|[\]\\]/g,'\\$&')).join('|')+')','gi');
  return safe.replace(re, m=>{ const i=v.findIndex(k=>k.toLowerCase()===m.toLowerCase());
    return `<mark class="hl" style="background:${HLCOLORS[(i<0?0:i)%HLCOLORS.length]}">${m}</mark>`; });

function allModSubsets(){
  const M=['ctrl','opt','shift','cmd']; const out=[[]];
  for(let mask=1; mask<16; mask++){ const s=[]; for(let i=0;i<4;i++) if(mask&(1<<i)) s.push(M[i]); out.push(s); }
  out.sort((a,b)=> a.length-b.length || a.join().localeCompare(b.join()));
  return out;
}
function favAttr(fk){ return fk.replace(/&/g,'&amp;').replace(/"/g,'&quot;'); }   // eid를 data-fav 속성으로 안전하게
function detailRow(mods, key, matches, hit){
  const ak=annKey(mods,key), note=ANN.note[ak]||'';   // 노트는 조합 단위 유지
  if(DKWS.length && (searchListMode==='filter' || DFILTER)){   // 숨김 모드: 이 조합에서 검색에 매치되는 단축키만 남기고(엔트리 단위), 하나도 없으면 행 숨김
    matches = matches.filter(e => DKWS.every(k => (e.action+' '+(e.detail||'')+' '+e.scope).toLowerCase().includes(k.toLowerCase())));
    if(!matches.length) return '';
  }
  matches=[...matches].sort((a,b)=>(a.ckey?1:0)-(b.ckey?1:0)||keyOrd(a.ckey).localeCompare(keyOrd(b.ckey))||[...(a.cmods||[])].sort().join('+').localeCompare([...(b.cmods||[])].sort().join('+'))||a.action.localeCompare(b.action));   // 무수식 먼저 → 채드는 2nd키(화살표 등 뭉침) → 2nd수식키 → 동작 순

    +(nch?`<button class="chordbtn" data-chord="${[...mods].join('+')}|${key}" title="이 조합으로 시작하는 연속 입력을 키보드에서 골라보기">▸ 연속 입력</button>`:'')
    +`<div class="dbody">${body}`+(note?`<div class="noteshow">📝 ${note.replace(/</g,'&lt;')}</div>`:'')+`</div>`
    +`<button class="notebtn" data-note="${ak}" title="노트">${note?'✎ 노트':'+ 노트'}</button></div>`;
}
function showDetail(key){

  else { det.style.display=''; if(selectedKey) showDetail(selectedKey);

    else if(showFav) det.innerHTML='';   // 쉬는 상태 + 즐겨찾기 모드 → 위 favpanel이 곧 홈이므로 상세는 비움
    else det.innerHTML='<div class="empty">키를 클릭하면 그 키에 걸린 <b>모든 수식키 조합</b>이 여기에 표시됩니다. 자주 쓰는 <b>단축키 하나</b>를 상세에서 <b style="color:#f59f00">☆</b>로 즐겨찾기하세요.</div>'; }
  const _sq=document.getElementById('search'); if(_sq) renderSearch(_sq.value.trim());   // 컨텍스트/레이어 바뀌면 검색 리스트도 갱신 (빈 검색어면 비움)
  saveHash();
}
function readHeld(e){ const h=new Set(); if(e.metaKey)h.add('cmd'); if(e.ctrlKey)h.add('ctrl'); if(e.altKey)h.add('opt'); if(e.shiftKey)h.add('shift'); return h; }
const CODEMAP={Backquote:'`',Minus:'-',Equal:'=',BracketLeft:'[',BracketRight:']',Semicolon:';',Quote:"'",Comma:',',Period:'.',Slash:'/',Space:'Space',Enter:'Return',Tab:'Tab',Escape:'Escape',Backspace:'Delete',Delete:'ForwardDelete',ArrowLeft:'Left',ArrowRight:'Right',ArrowUp:'Up',ArrowDown:'Down',Home:'Home',End:'End',PageUp:'PageUp',PageDown:'PageDown',CapsLock:'CapsLock'};
function codeToKey(code){ if(!code)return null; if(code==='Backslash')return String.fromCharCode(92); if(code.startsWith('Key'))return code.slice(3); if(code.startsWith('Digit'))return code.slice(5); if(code[0]==='F'&&code.length<=3&&!isNaN(parseInt(code.slice(1),10)))return code; return CODEMAP[code]||null; }
const MODCODE={MetaLeft:'cmd',MetaRight:'cmd',ControlLeft:'ctrl',ControlRight:'ctrl',AltLeft:'opt',AltRight:'opt',ShiftLeft:'shift',ShiftRight:'shift'};   // 물리 수식키 코드 → 수식키
document.addEventListener('keydown',e=>{ if(e.target.tagName==='INPUT')return;
  if(e.key==='Escape'&&chordPrefix){ e.preventDefault(); exitChord(); return; }
  if(e.key==='Escape'&&panelMode){ e.preventDefault(); panelMode=null; sync(); return; }
  if(panelMode==='quiz'){ const mk=codeToKey(e.code); if(mk){ e.preventDefault(); if(!e.repeat){ if(quizState&&!quizState.answered){ const combo=comboSym([...readHeld(e)])+mk; gradeQuiz(combo); } else { newQuizQ(); renderQuiz(); } } } return; }
  if(!captureKeys) return;   // 입력 감지 OFF — ⌘C 복사·텍스트 편집 등 브라우저 기본 동작을 막지 않음
  const h=readHeld(e);   // 실제 입력에 충실 — 브라우저가 받은 그대로(예: caps→⌘Space 리맵이면 ⌘Space가 정확)
  const mp2=MODCODE[e.code]; let stickyChanged=false;
  if(mp2 && !e.repeat && sticky.has(mp2)){ sticky.delete(mp2); h.delete(mp2); stickyChanged=true; }   // 클릭으로 고정(sticky)한 수식키를 물리 수식키로 즉시 해제
  const mapped=codeToKey(e.code);
  const s=[...h].sort().join(); let changed=false;
  if(s!==heldStr || stickyChanged){ heldStr=s; held=h; changed=true; }
  if(mapped){ e.preventDefault(); if(!e.repeat){ selectedKey = (mapped===selectedKey ? null : mapped); changed=true; } }
  if(changed) sync(); });   // 같은 키 다시 누르면 해제(토글)
document.addEventListener('keyup',e=>{ if(!captureKeys) return; const h=readHeld(e); const s=[...h].sort().join(); if(s!==heldStr){heldStr=s;held=h;sync();} });
window.addEventListener('blur',()=>{ if(heldStr){heldStr='';held=new Set();sync();} });

// 쉬는 상태(검색·선택 키 없음)의 상세 영역에 즐겨찾기 홈을 렌더 — 없으면 안내
// 즐겨찾기 파싱값 → 실제 DB 엔트리 찾기 (잘못 저장된 flat-chord도 진짜 채드로 복구)
function favEntry(p){
  if(!p) return null;
  const c = DB.entries.filter(x=>x.action===p.action && x.source===p.source && x.scope===p.scope);
  return c.find(x=>x.key===p.key && sameSet(x.mods,new Set(p.mods)) && (p.ckey? x.ckey===p.ckey : !x.ckey))
      || c.find(x=>x.ckey===p.key && sameSet(x.cmods||[],new Set(p.mods)))   // parsed key/mods가 실은 2nd 누름(ckey/cmods)였던 경우
      || c[0] || null;
}
// 즐겨찾기 정렬: 수식키 수 → 첫 키 → 채드 여부 → 2nd 누름 → 동작 (eid당 favEntry 1회만)
function sortedFavKeys(){ return Object.keys(ANN.fav).map(fk=>({fk, e:favEntry(favParse(fk))}))
  .sort((A,B)=>{ const a=A.e||{}, b=B.e||{};
    return (a.mods?a.mods.length:9)-(b.mods?b.mods.length:9) || keyOrd(a.key||A.fk).localeCompare(keyOrd(b.key||B.fk)) || ((a.ckey?1:0)-(b.ckey?1:0)) || keyOrd(a.ckey).localeCompare(keyOrd(b.ckey)) || (a.action||'').localeCompare(b.action||''); })
  .map(x=>x.fk); }
// 즐겨찾기 한 줄 — 엔트리 단위(별표한 그 단축키 하나) 또는 레거시 조합키 둘 다 처리
function favRowHTML(fk){
  const p=favParse(fk);
  if(p){   // 엔트리 단위 — 실제 엔트리(채드 포함)로 표시
    const e=favEntry(p)||p;
    const combo = e.ckey ? `${comboSym(e.mods)||''}${e.key} ▸ ${comboSym(e.cmods||[])}${e.ckey}` : `${comboSym(e.mods)||'(무수식)'}${e.key}`;
    return `<div class="row" data-selkey="${(e.key||'').replace(/"/g,'&quot;')}" data-selmods="${(e.mods||[]).join('+')}"><button class="favbtn on" data-fav="${favAttr(fk)}" title="즐겨찾기 해제">⭐</button><span class="kc">${combo}</span>`
      +`<span class="src" style="background:${COLORS[e.source]||'#666'}">${e.source}</span>`
      +`<div style="flex:1">${(e.action||'').replace(/</g,'&lt;')}</div><span class="scope">${scopeIcon(e.scope)}${e.scope}</span></div>`;
  }
  const i=fk.indexOf('|'), modstr=fk.slice(0,i), key=fk.slice(i+1), mods=modstr?modstr.split('+'):[];   // 레거시 조합
  const matches=DB.entries.filter(e=>e.key===key && sameSet(e.mods,new Set(mods)));
  const acts=[...new Set(matches.map(e=>(e.ckey?'▸'+chordSym(e)+' ':'')+e.action))];
  const actTxt=acts.slice(0,3).map(a=>a.replace(/</g,'&lt;')).join(' / ');
  const act=acts.length?actTxt+(acts.length>3?` <span class="muted">…(+${acts.length-3})</span>`:''):'(빈 조합)';
  const scps=[...new Set(matches.map(e=>e.scope))];
  return `<div class="row" data-selkey="${(key||'').replace(/"/g,'&quot;')}" data-selmods="${mods.join('+')}"><button class="favbtn on" data-fav="${favAttr(fk)}" title="즐겨찾기 해제">⭐</button><span class="kc">${comboSym(mods)||'(무수식)'}${key} <span class="muted" style="font-size:10px">(조합 전체)</span></span>`
    +`<div style="flex:1">${act}</div><span class="scope">${scopeIcon(scps[0])}${scps[0]||'free'}${scps.length>1?` +${scps.length-1}`:''}</span></div>`;
}
function wireFavRows(root){
  root.querySelectorAll('[data-selkey]').forEach(el=>el.onclick=(ev)=>{ if(ev.target.closest('.favbtn'))return; chordPrefix=null; chordReturn=null; sticky=new Set(el.dataset.selmods?el.dataset.selmods.split('+'):[]); held=new Set(); selectedKey=el.dataset.selkey; sync(); window.scrollTo({top:0,behavior:'smooth'}); });
  root.querySelectorAll('[data-fav]').forEach(b=>b.onclick=(ev)=>{ ev.stopPropagation(); delete ANN.fav[b.dataset.fav]; saveAnn(); sync(); });
}
function favFksFor(){   // favMode에 맞는 즐겨찾기 fk 목록(정렬됨) · 'ctx'면 현재 컨텍스트 스코프만
  const all=sortedFavKeys();
  if(favMode!=='ctx') return all;
  return all.filter(fk=>{ const p=favParse(fk);
    if(p){ const e=favEntry(p); return e?inCtx(e):false; }
    const i=fk.indexOf('|'), key=fk.slice(i+1), ms=fk.slice(0,i)?fk.slice(0,i).split('+'):[];
    return DB.entries.some(x=>x.key===key && sameSet(x.mods,new Set(ms)) && inCtx(x)); });
}
function favGridKeys(){   // 즐겨찾기가 걸린 '그리드 키'(첫 누름) 집합 — 키보드 금색 강조용
  const out=new Set();
  favFksFor().forEach(fk=>{ const p=favParse(fk); if(p){ const e=favEntry(p)||p; if(e.key) out.add(e.key); } else out.add(fk.slice(fk.indexOf('|')+1)); });
  return out;
}
function renderFavPanel(fp){   // 상세(기본 단축키 리스트) 위에 뜨는 즐겨찾기 리스트 — favMode에 따라 전체/현재 컨텍스트
  const tot=Object.keys(ANN.fav).length;
  if(!tot){ fp.innerHTML='<div class="sec">⭐ 즐겨찾기 — 아직 없음. 키 클릭 → 하단 상세에서 각 단축키의 <b style="color:#f59f00">☆</b>를 눌러 추가하세요.</div>'; return; }
  const fks=favFksFor();
  const label = favMode==='ctx' ? `현재 컨텍스트 <span style="color:#7dd3fc">${[...ctxSet].join(', ')||'없음'}</span>` : '전체';
  if(!fks.length){ fp.innerHTML=`<div class="sec">⭐ 즐겨찾기 · ${label} — 이 컨텍스트에 해당하는 즐겨찾기가 없습니다 <span class="muted" style="text-transform:none;letter-spacing:0">(전체 ${tot}개 · '전체 즐겨찾기'로 전환)</span></div>`; return; }
  fp.innerHTML=`<div class="sec">⭐ 즐겨찾기 · ${label} ${fks.length}개 <span class="muted" style="text-transform:none;letter-spacing:0">— 위 키보드에 <b style="color:#e0a82e">금색</b>으로 표시</span></div>`+fks.map(favRowHTML).join('');
  wireFavRows(fp);
}
function setFavMode(m){ favMode=(favMode===m?null:m); localStorage.setItem('SVfavMode',favMode||''); sync(); if(favMode){ const fp=document.getElementById('favpanel'); if(fp.textContent) fp.scrollIntoView({behavior:'smooth',block:'start'}); } }
// 즐겨찾기 정규화: 옛 flat/평탄화 채드 eid를 실제 엔트리의 정식 eid로 교체 → 상세·그리드 별표가 일관되게 표시
function normalizeFavs(){ let changed=false; const fixed={};
  for(const fk of Object.keys(ANN.fav)){ const p=favParse(fk); const e=p&&favEntry(p); const nk=e?eid(e):fk; if(nk!==fk) changed=true; fixed[nk]=1; }
  ANN.fav=fixed; if(changed) saveAnn(); }
mergeCustom(); normalizeFavs(); restoreHash(); renderMeta(); renderChips(); renderCtx(); sync();
document.getElementById('addbtn').onclick=addCustom;
document.getElementById('moretoggle').onclick=()=>{ const m=document.getElementById('moretools'); const show=m.style.display==='none'; m.style.display=show?'flex':'none'; document.getElementById('hint').style.display=show?'block':'none'; document.getElementById('moretoggle').classList.toggle('on',show); };
document.getElementById('ctxtoggle').onclick=()=>{ const c=document.getElementById('ctxchips'); const show=c.style.display==='none'; c.style.display=show?'inline-flex':'none'; document.getElementById('ctxtoggle').textContent=show?'▴ 접기':'▾ 앱 선택'; };
const searchEl=document.getElementById('search'), searchBox=document.querySelector('.searchbox');
function clearSearch(){ searchEl.value=''; searchBox.classList.remove('has'); sync(); }
let _searchT=null;   // 검색 입력 디바운스 — 전체단축키(1470행) 등 무거운 sync를 타이핑마다 돌리면 느려서, 멈춘 뒤 한 번만
searchEl.oninput=e=>{ searchBox.classList.toggle('has',!!e.target.value); clearTimeout(_searchT); _searchT=setTimeout(sync,150); };
searchEl.addEventListener('keydown',e=>{ if(e.key==='Escape'){ e.preventDefault(); clearSearch(); searchEl.blur(); } });
document.getElementById('searchclear').onclick=()=>{ clearSearch(); searchEl.focus(); };
document.getElementById('favall').onclick=()=>setFavMode('all');
document.getElementById('favctx').onclick=()=>setFavMode('ctx');
document.querySelectorAll('[data-view]').forEach(b=>b.onclick=()=>setView(b.dataset.view));
document.getElementById('themebtn').onclick=()=>{ theme=theme==='light'?'dark':'light'; document.documentElement.setAttribute('data-theme',theme); localStorage.setItem('SVtheme',theme); };
{ const sl=document.getElementById('sizeslider'); sl.value=U;   // 키보드 크기 슬라이더 — 드래그하면 연속 조절
  sl.oninput=()=>{ U=+sl.value; localStorage.setItem('SVkeyU',U); sync(); }; }
{ const sm=document.getElementById('searchmode'); sm.value=searchGridMode;   // 그리드(키보드) 검색 표시: 강조 / 강조+숨김
  sm.onchange=()=>{ searchGridMode=sm.value; localStorage.setItem('SVsearchGrid',searchGridMode); sync(); }; }
document.getElementById('commonbtn').onclick=()=>{ hideCommon=!hideCommon; localStorage.setItem('SVhideCommon',hideCommon?'1':'0'); document.getElementById('commonbtn').classList.toggle('on',hideCommon); sync(); };
document.getElementById('capturebtn').onclick=()=>{ captureKeys=!captureKeys; localStorage.setItem('SVcapture',captureKeys?'1':'0'); if(!captureKeys){ held=new Set(); heldStr=''; } sync(); };
document.getElementById('printbtn').onclick=()=>{ const ov=overview,pm=panelMode; overview=true; panelMode=null; document.getElementById('ovbtn').classList.add('on'); sync(); setTimeout(()=>{ window.print(); overview=ov; panelMode=pm; document.getElementById('ovbtn').classList.toggle('on',overview); sync(); },150); };
document.getElementById('csvbtn').onclick=()=>exportRows('csv');
document.getElementById('mdbtn').onclick=()=>exportRows('md');
document.getElementById('scopepos').onclick=()=>{ prefScopeRight=!prefScopeRight; localStorage.setItem('SVscopeRight',prefScopeRight?'1':'0'); if(selectedKey)showDetail(selectedKey); };
document.getElementById('annexport').onclick=()=>{ const b=new Blob([JSON.stringify(ANN,null,2)],{type:'application/json'}); const a=document.createElement('a'); a.href=URL.createObjectURL(b); a.download='shortcut-annotations.json'; a.click(); };
document.getElementById('annimport').onchange=e=>{ const f=e.target.files[0]; if(!f)return; const rd=new FileReader(); rd.onload=()=>{ try{ const j=JSON.parse(rd.result); Object.assign(ANN.fav,j.fav||{}); Object.assign(ANN.note,j.note||{}); saveAnn(); sync(); alert('가져왔습니다 ✓'); }catch(_){ alert('JSON 파싱 실패'); } }; rd.readAsText(f); };
</script>
